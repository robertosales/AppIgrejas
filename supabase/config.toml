[auth]
enabled = true
site_url = "https://appigrejas.com"
additional_redirect_urls = ["https://*.appigrejas.com"]

[auth.email]
enable_signup = true
enable_confirmations = true

[api]
port = 54321
schemas = ["public", "storage", "auth"]

[db.migrations]
schema_path = "./migrations"

[storage]
enabled = true

[storage.buckets.church_logos]
public = false
file_size_limit = "5MB"
allowed_mime_types = ["image/png", "image/jpeg", "image/svg+xml"]

[storage.buckets.church_media]
public = false
file_size_limit = "50MB"

[storage.buckets.content_uploads]
public = false
file_size_limit = "100MB"
